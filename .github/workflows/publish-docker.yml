name: Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*" # For pre-releases like v1.2.3-beta

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # pin@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # pin@v3.11.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # pin@v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        env:
          DOCKER_HUB_PUSH_TOKEN: ${{ secrets.DOCKER_HUB_PUSH_TOKEN }}
        run: |
          echo "${DOCKER_HUB_PUSH_TOKEN}" | docker login --username "squareup" --password-stdin

      - name: Extract version metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"
          echo "git_commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # pin@v5.8.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/cachew
            squareup/cachew
          tags: |
            # For tags: v1.2.3 -> 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Tag stable releases (no pre-release suffix) as latest
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - uses: cashapp/activate-hermit@e49f5cb4dd64ff0b0b659d1d8df499595451155a # v1
      - run: |
          just build linux arm64
          just build linux amd64
      - name: Build and push Docker image
        uses: docker/build-push-action@8c1e8f8e5bf845ba3773a14f3967965548a2341e # pin@v6.18.0
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
